# .github/workflows/deploy.yml
# Build → GHCR → SSH deploy to Docker Swarm
#
# Required Secrets (Settings → Secrets → Actions):
#   SWARM_HOST       IP / hostname of your Swarm manager
#   SWARM_USER       SSH username
#   SWARM_SSH_KEY    Full private key (-----BEGIN ... KEY-----)
#   SWARM_SSH_PORT   SSH port (usually 22)

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Swarm
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy stack file to manager
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key:      ${{ secrets.SWARM_SSH_KEY }}
          port:     ${{ secrets.SWARM_SSH_PORT || 22 }}
          source:   docker-stack.yml
          target:   /opt/split/

      - name: Deploy stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key:      ${{ secrets.SWARM_SSH_KEY }}
          port:     ${{ secrets.SWARM_SSH_PORT || 22 }}
          script: |
            set -e
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            docker pull "$IMAGE"

            GITHUB_USER=${{ github.actor }} IMAGE_TAG=latest \
              docker stack deploy \
                --compose-file /opt/split/docker-stack.yml \
                --with-registry-auth \
                split

            echo "— Service status —"
            docker service ls | grep split
            echo "✓ Done"
